name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  quality:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

  schema-lint:
    name: Atlas Schema Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ariga/setup-atlas@v0

      - name: Lint migration against main
        run: |
          atlas migrate lint \
            --dev-url "docker://mysql/8/dev" \
            --dir "file://packages/db/migrations" \
            --base "origin/main" \
            --format "{{ .MermaidERD }}"
        continue-on-error: true

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: inventory
          MYSQL_USER: app
          MYSQL_PASSWORD: apppass
        ports:
          - "3306:3306"
        options: >-
          --health-cmd "mysqladmin ping -uroot -ptestpass"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: ariga/setup-atlas@v0

      - run: pnpm install --frozen-lockfile

      - name: Apply migrations
        env:
          DB_URL: mysql://app:apppass@localhost:3306/inventory
          ATLAS_DEV_URL: docker://mysql/8/dev
        run: atlas migrate apply --env local

      - name: Run integration tests
        env:
          DB_URL: mysql://app:apppass@localhost:3306/inventory
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-for-ci-at-least-32-characters-long
          NODE_ENV: test
        run: pnpm test:int
